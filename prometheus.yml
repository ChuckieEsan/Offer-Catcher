global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Offer-Catcher 应用 metrics
  # 应用暴露 metrics 在端口 9464
  - job_name: 'offer-catcher'
    static_configs:
      - targets: ['host.docker.internal:9464']
    # 如果在 Linux 上运行，使用 extra_hosts 将 host.docker.internal 解析为主机 IP